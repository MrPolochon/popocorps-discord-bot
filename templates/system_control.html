<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrôle des Systèmes - PopoCorps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .system-card { transition: all 0.3s ease; margin-bottom: 20px; }
        .system-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .status-enabled { background: linear-gradient(45deg, #28a745, #20c997); color: white; }
        .status-disabled { background: linear-gradient(45deg, #dc3545, #fd7e14); color: white; }
        .toggle-btn { border: none; border-radius: 25px; padding: 8px 20px; font-weight: bold; transition: all 0.3s ease; }
        .btn-enable { background: linear-gradient(45deg, #28a745, #20c997); color: white; }
        .btn-disable { background: linear-gradient(45deg, #dc3545, #fd7e14); color: white; }
        .btn-enable:hover, .btn-disable:hover { transform: scale(1.05); color: white; }
        .navbar { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .navbar-brand { color: white !important; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-robot me-2"></i>PopoCorps Dashboard</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="/"><i class="fas fa-home me-1"></i>Accueil</a>
                <a class="nav-link text-white" href="/warnings"><i class="fas fa-exclamation-triangle me-1"></i>Avertissements</a>
                <a class="nav-link text-white" href="/guilds"><i class="fas fa-server me-1"></i>Serveurs</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="fas fa-cogs me-2"></i>Contrôle des Systèmes du Bot</h4>
                        <small>Activez ou désactivez les différents systèmes de PopoCorps</small>
                    </div>
                    <div class="card-body">
                        <div class="row" id="systems-container">
                            <!-- Systems will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const systems = [
            {
                id: 'ai_chat_enabled',
                name: 'Chat IA',
                description: 'Réponses intelligentes aux messages qui mentionnent le bot',
                icon: 'fas fa-robot',
                category: 'Intelligence'
            },
            {
                id: 'continuous_spam_enabled',
                name: 'Détection Spam 24/7',
                description: 'Surveillance continue des messages suspects',
                icon: 'fas fa-shield-alt',
                category: 'Protection'
            },
            {
                id: 'audit_logs_enabled',
                name: 'Journaux d\'Audit',
                description: 'Enregistrement de toutes les activités du serveur',
                icon: 'fas fa-file-alt',
                category: 'Surveillance'
            },
            {
                id: 'welcome_enabled',
                name: 'Messages de Bienvenue',
                description: 'Messages personnalisés pour nouveaux membres',
                icon: 'fas fa-hand-paper',
                category: 'Accueil'
            },
            {
                id: 'goodbye_enabled',
                name: 'Messages d\'Adieu',
                description: 'Messages quand un membre quitte le serveur',
                icon: 'fas fa-hand-peace',
                category: 'Accueil'
            },
            {
                id: 'raid_mode_enabled',
                name: 'Mode Anti-Raid',
                description: 'Autorise /raid on et off manuellement',
                icon: 'fas fa-exclamation-triangle',
                category: 'Protection'
            },
            {
                id: 'auto_raid_enabled',
                name: 'Auto-Raid',
                description: 'Verrouillage automatique si attaque coordonnée détectée',
                icon: 'fas fa-shield-alt',
                category: 'Protection'
            }
        ];

        async function loadSystemStates() {
            try {
                const response = await fetch('/api/system-states');
                const states = await response.json();
                
                const container = document.getElementById('systems-container');
                container.innerHTML = '';
                
                const categories = [...new Set(systems.map(s => s.category))];
                
                categories.forEach(category => {
                    const categoryDiv = document.createElement('div');
                    categoryDiv.className = 'col-12 mb-3';
                    categoryDiv.innerHTML = `<h5 class="text-white mb-3"><i class="fas fa-folder me-2"></i>${category}</h5>`;
                    container.appendChild(categoryDiv);
                    
                    const categoryRow = document.createElement('div');
                    categoryRow.className = 'row';
                    container.appendChild(categoryRow);
                    
                    systems.filter(s => s.category === category).forEach(system => {
                        const isEnabled = states[system.id] || false;
                        const systemCard = createSystemCard(system, isEnabled);
                        categoryRow.appendChild(systemCard);
                    });
                });
            } catch (error) {
                console.error('Erreur lors du chargement des états des systèmes:', error);
            }
        }

        function createSystemCard(system, isEnabled) {
            const div = document.createElement('div');
            div.className = 'col-lg-6 col-xl-4';
            
            const statusClass = isEnabled ? 'status-enabled' : 'status-disabled';
            const statusText = isEnabled ? 'Activé' : 'Désactivé';
            const buttonClass = isEnabled ? 'btn-disable' : 'btn-enable';
            const buttonText = isEnabled ? 'Désactiver' : 'Activer';
            const buttonIcon = isEnabled ? 'fas fa-stop' : 'fas fa-play';
            
            div.innerHTML = `
                <div class="card system-card ${statusClass}">
                    <div class="card-body text-center">
                        <i class="${system.icon} fa-2x mb-3"></i>
                        <h5 class="card-title">${system.name}</h5>
                        <p class="card-text small">${system.description}</p>
                        <div class="mb-3">
                            <span class="badge bg-light text-dark">${statusText}</span>
                        </div>
                        <button 
                            class="btn toggle-btn ${buttonClass}" 
                            onclick="toggleSystem('${system.id}', ${!isEnabled})"
                        >
                            <i class="${buttonIcon} me-2"></i>${buttonText}
                        </button>
                    </div>
                </div>
            `;
            
            return div;
        }

        async function toggleSystem(systemId, enable) {
            try {
                const response = await fetch('/api/toggle-system', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        system: systemId,
                        enabled: enable
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Reload system states to update UI
                    await loadSystemStates();
                    
                    // Show success message
                    showNotification(`Système ${enable ? 'activé' : 'désactivé'} avec succès!`, 'success');
                } else {
                    showNotification('Erreur lors de la modification du système', 'error');
                }
            } catch (error) {
                console.error('Erreur:', error);
                showNotification('Erreur de connexion', 'error');
            }
        }

        function showNotification(message, type) {
            const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
            const notification = document.createElement('div');
            notification.className = `alert ${alertClass} alert-dismissible fade show position-fixed`;
            notification.style.cssText = 'top: 20px; right: 20px; z-index: 9999; max-width: 400px;';
            notification.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.parentNode.removeChild(notification);
                }
            }, 5000);
        }

        // Load system states on page load
        document.addEventListener('DOMContentLoaded', loadSystemStates);
        
        // Refresh every 10 seconds
        setInterval(loadSystemStates, 10000);
    </script>
</body>
</html>
